version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ascendant-postgres
    environment:
      POSTGRES_DB: ascendant
      POSTGRES_USER: ascendant_user
      POSTGRES_PASSWORD: ascendant_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./src/main/resources/db/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ascendant_user -d ascendant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ascendant-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ascendant_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ascendant_redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
